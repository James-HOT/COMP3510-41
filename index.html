<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lost & Found System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-lang="en">
<header>
  <div class="header-inner">
    <h1 data-en="🏷️ Lost & Found" data-zh="🏷️ 失物招領">🏷️ Lost & Found</h1>
    <div class="controls">
      <button class="btn btn-primary hidden" id="reportBtn" data-en="Report Item" data-zh="報告物品">Report Item</button>
      <button class="btn btn-warning hidden" id="matchBtn" data-en="Match Items" data-zh="配對物品">Match Items</button>
      <button class="btn btn-outline" id="loginBtn" data-en="Login" data-zh="登入">Login</button>
      <button class="btn btn-outline" id="langBtn" data-en="中文" data-zh="English">中文</button>
    </div>
  </div>
</header>
<main>
  <div id="adminNotice" class="admin-notice hidden"></div>
  <section class="toolbar">
    <div>
      <label data-en="Type" data-zh="類型">Type</label>
      <select id="typeFilter">
        <option value="all" data-en="All" data-zh="全部">All</option>
        <option value="lost" data-en="Lost" data-zh="遺失">Lost</option>
        <option value="found" data-en="Found" data-zh="拾獲">Found</option>
        <option value="matched" data-en="Matched" data-zh="已配對">Matched</option>
      </select>
    </div>
    <div>
      <label data-en="Category" data-zh="類別">Category</label>
      <select id="categoryFilter">
        <option value="all" data-en="All Categories" data-zh="所有類別">All Categories</option>
        <option value="electronics" data-en="Electronics" data-zh="電子產品">Electronics</option>
        <option value="wallet" data-en="Wallet / Cards / Cash" data-zh="錢包／證件／現金">Wallet / Cards / Cash</option>
        <option value="keys" data-en="Keys" data-zh="鎖匙">Keys</option>
        <option value="documents" data-en="Documents / ID" data-zh="文件／身份證明">Documents / ID</option>
        <option value="other" data-en="Other" data-zh="其他">Other</option>
      </select>
    </div>
    <div>
      <label data-en="Search" data-zh="搜尋">Search</label>
      <input type="text" id="searchInput" data-en-placeholder="Title, location, description..." data-zh-placeholder="標題、地點、描述...">
    </div>
  </section>
  <p id="count" style="text-align:center; color:var(--gray); margin:1.6rem 0; font-weight:500;"></p>
  <section class="grid" id="itemsGrid"></section>
  <section style="margin:4rem 0 2.5rem;">
    <h2 data-en="Items on Map" data-zh="地圖上的物品位置">Items on Map</h2>
    <div id="map"></div>
  </section>
</main>

<!-- Login Modal -->
<div class="modal" id="loginModal">
  <div class="modal-box" style="max-width:420px;">
    <div class="modal-header">
      <h2 data-en="Login / Quick Register" data-zh="登入 / 快速註冊">Login / Quick Register</h2>
      <span style="font-size:2.4rem;cursor:pointer;" onclick="closeModal('loginModal')">×</span>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label data-en="Email" data-zh="電郵">Email</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label data-en="Password" data-zh="密碼">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <p id="loginHint" style="font-size:0.94rem; color:#6b7280; margin-top:1.1rem;"
         data-en="No registration needed — just enter your email and password to sign in or create an account instantly."
         data-zh="無需註冊，直接輸入電郵與密碼即可快速登入／建立帳號。">
        No registration needed — just enter your email and password to sign in or create an account instantly.
      </p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('loginModal')" data-en="Cancel" data-zh="取消">Cancel</button>
      <button class="btn btn-primary" onclick="handleLogin()" data-en="Login" data-zh="登入">Login</button>
    </div>
  </div>
</div>

<!-- Report Modal -->
<div class="modal" id="reportModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2 data-en="Report Lost or Found Item" data-zh="報告遺失或拾獲物品">Report Lost or Found Item</h2>
      <span style="font-size:2.4rem;cursor:pointer;" onclick="closeModal('reportModal')">×</span>
    </div>
    <div class="modal-body">
      <form id="reportForm" autocomplete="off">
        <div class="form-group">
          <label data-en="Your Name *" data-zh="您的姓名 *">Your Name *</label>
          <input type="text" id="reportName" name="name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label data-en="Status *" data-zh="狀態 *">Status *</label>
          <select name="status" required>
            <option value="">-- Please select --</option>
            <option value="lost" data-en="I lost this" data-zh="我遺失了此物品">I lost this</option>
            <option value="found" data-en="I found this" data-zh="我拾獲此物品">I found this</option>
          </select>
        </div>
        <div class="form-group">
          <label data-en="Category *" data-zh="類別 *">Category *</label>
          <select name="category" required>
            <option value="">-- Please select --</option>
            <option value="electronics">Electronics</option>
            <option value="wallet">Wallet / Cards / Cash</option>
            <option value="keys">Keys</option>
            <option value="documents">Documents / ID</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label data-en="Title *" data-zh="標題 *">Title *</label>
          <input type="text" name="title" required placeholder="e.g. Black AirPods Pro 2">
        </div>
        <div class="form-group">
          <label data-en="Location *" data-zh="地點 *">Location *</label>
          <input type="text" name="location" required placeholder="e.g. Kwai Chung Plaza near MTR Exit B">
        </div>
        <div class="form-group">
          <label data-en="Date *" data-zh="日期 *">Date *</label>
          <input type="date" name="date" required>
        </div>
        <div class="form-group">
          <label data-en="Photo (optional)" data-zh="相片 (可選)">Photo (optional)</label>
          <input type="file" id="imageInput" accept="image/*">
          <img id="preview" style="max-width:100%; max-height:240px; margin-top:1.2rem; display:none; border-radius:8px;" alt="Photo preview">
        </div>
        <div class="form-group">
          <label data-en="Description" data-zh="描述">Description</label>
          <textarea name="description" rows="4" maxlength="600" placeholder="Color, brand, special features..."></textarea>
        </div>
        <div class="form-group">
          <label data-en="Contact Info *" data-zh="聯絡方式 *">Contact Info *</label>
          <input type="text" name="contact" required placeholder="Phone or email">
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('reportModal')" data-en="Cancel" data-zh="取消">Cancel</button>
      <button class="btn btn-primary" onclick="submitReport()" data-en="Submit" data-zh="提交">Submit</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal" id="editModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2 data-en="Edit Item" data-zh="編輯物品">Edit Item</h2>
      <span style="font-size:2.4rem;cursor:pointer;" onclick="closeModal('editModal')">×</span>
    </div>
    <div class="modal-body">
      <form id="editForm" autocomplete="off">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label data-en="Status" data-zh="狀態">Status</label>
          <select id="editStatus">
            <option value="lost">Lost / 遺失</option>
            <option value="found">Found / 拾獲</option>
            <option value="matched">Matched / 已配對</option>
          </select>
        </div>
        <div class="form-group">
          <label data-en="Category" data-zh="類別">Category</label>
          <select id="editCategory">
            <option value="electronics">Electronics / 電子產品</option>
            <option value="wallet">Wallet / Cards / Cash / 錢包／證件／現金</option>
            <option value="keys">Keys / 鎖匙</option>
            <option value="documents">Documents / ID / 文件／身份證明</option>
            <option value="other">Other / 其他</option>
          </select>
        </div>
        <div class="form-group">
          <label data-en="Title" data-zh="標題">Title</label>
          <input type="text" id="editTitle" required>
        </div>
        <div class="form-group">
          <label data-en="Location" data-zh="地點">Location</label>
          <input type="text" id="editLocation" required>
        </div>
        <div class="form-group">
          <label data-en="Date" data-zh="日期">Date</label>
          <input type="date" id="editDate" required>
        </div>
        <div class="form-group">
          <label data-en="Description" data-zh="描述">Description</label>
          <textarea id="editDescription" rows="4" maxlength="600"></textarea>
        </div>
        <div class="form-group">
          <label data-en="Contact Info" data-zh="聯絡方式">Contact Info</label>
          <input type="text" id="editContact" required>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('editModal')" data-en="Cancel" data-zh="取消">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()" data-en="Save" data-zh="儲存">Save</button>
    </div>
  </div>
</div>

<footer>
  Lost & Found System • Map data © <a href="https://www.openstreetmap.org/copyright" style="color:#6b7280;">OpenStreetMap</a> • 2026
</footer>

<script src="script.js"></script>
</body>
</html>
